name: Apply public site review fixes

on:
  push:
    branches:
      - claude/issue-114-20260724-0639

permissions:
  contents: write

jobs:
  apply-fixes:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/issue-114-20260724-0639
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply reviewed corrections
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str, count: int = 1) -> None:
              file = Path(path)
              text = file.read_text()
              if old not in text:
                  raise SystemExit(f"Expected text not found in {path}: {old[:100]!r}")
              file.write_text(text.replace(old, new, count))

          # Shared, explicit save-result signal used by the editor and workspace wrapper.
          Path("lib/project-save-result.ts").write_text('''export const PROJECT_SAVE_RESULT_EVENT = "launchpad:project-save-result";\n\nexport type ProjectSaveResultDetail = Readonly<{ success: boolean }>;\n\nexport function shouldCloseWorkspaceAfterSave(\n  detail: ProjectSaveResultDetail | null | undefined,\n): boolean {\n  return detail?.success === true;\n}\n''')

          # TokenStudio: stale generated HTML when description changes and emit save result.
          replace(
              "components/token-studio.tsx",
              'import { findSlugCollision, slugify, validateSlug } from "@/lib/slug";\n',
              'import { PROJECT_SAVE_RESULT_EVENT } from "@/lib/project-save-result";\nimport { findSlugCollision, slugify, validateSlug } from "@/lib/slug";\n',
          )
          replace(
              "components/token-studio.tsx",
              'const IDENTITY_KEYS = new Set<keyof TokenProject>(["name", "ticker", "heroImage"]);',
              'const IDENTITY_KEYS = new Set<keyof TokenProject>([\n  "name",\n  "ticker",\n  "description",\n  "heroImage",\n]);',
          )
          replace(
              "components/token-studio.tsx",
              '''    if (!validation.valid) {\n      setNotice(validation.reason);\n      return false;\n    }''',
              '''    if (!validation.valid) {\n      setNotice(validation.reason);\n      window.dispatchEvent(\n        new CustomEvent(PROJECT_SAVE_RESULT_EVENT, { detail: { success: false } }),\n      );\n      return false;\n    }''',
          )
          replace(
              "components/token-studio.tsx",
              '''    if (collision) {\n      setNotice(\n        `"${slug}" is already used by ${collision.name || "another saved project"} in this browser. Choose a different website path.`,\n      );\n      return false;\n    }''',
              '''    if (collision) {\n      setNotice(\n        `"${slug}" is already used by ${collision.name || "another saved project"} in this browser. Choose a different website path.`,\n      );\n      window.dispatchEvent(\n        new CustomEvent(PROJECT_SAVE_RESULT_EVENT, { detail: { success: false } }),\n      );\n      return false;\n    }''',
          )
          replace(
              "components/token-studio.tsx",
              '''    setNotice(`${saved.name || "Project"} saved privately in this browser.`);\n    return true;''',
              '''    setNotice(`${saved.name || "Project"} saved privately in this browser.`);\n    window.dispatchEvent(\n      new CustomEvent(PROJECT_SAVE_RESULT_EVENT, { detail: { success: true } }),\n    );\n    return true;''',
          )

          # Workspace: close only after a confirmed successful save event.
          replace(
              "components/token-studio-workspace.tsx",
              'import { useEffect, useState } from "react";',
              'import { useEffect, useRef, useState } from "react";',
          )
          replace(
              "components/token-studio-workspace.tsx",
              'import type { TokenProject } from "@/lib/types";\n',
              'import {\n  PROJECT_SAVE_RESULT_EVENT,\n  shouldCloseWorkspaceAfterSave,\n  type ProjectSaveResultDetail,\n} from "@/lib/project-save-result";\nimport type { TokenProject } from "@/lib/types";\n',
          )
          replace(
              "components/token-studio-workspace.tsx",
              '''  const [isOpen, setIsOpen] = useState(false);\n  const [pendingAction, setPendingAction] = useState<PendingAction>(null);''',
              '''  const [isOpen, setIsOpen] = useState(false);\n  const [pendingAction, setPendingAction] = useState<PendingAction>(null);\n  const awaitingSaveAndClose = useRef(false);''',
          )
          replace(
              "components/token-studio-workspace.tsx",
              '''  useEffect(() => {\n    seedHoodlumsLaunch();\n  }, []);\n\n  useEffect(() => {\n    if (!isOpen || !pendingAction) return;''',
              '''  useEffect(() => {\n    seedHoodlumsLaunch();\n  }, []);\n\n  useEffect(() => {\n    function onProjectSaveResult(event: Event) {\n      if (!awaitingSaveAndClose.current) return;\n      const detail = (event as CustomEvent<ProjectSaveResultDetail>).detail;\n      awaitingSaveAndClose.current = false;\n      if (!shouldCloseWorkspaceAfterSave(detail)) return;\n      setPendingAction(null);\n      setIsOpen(false);\n    }\n\n    window.addEventListener(PROJECT_SAVE_RESULT_EVENT, onProjectSaveResult);\n    return () => window.removeEventListener(PROJECT_SAVE_RESULT_EVENT, onProjectSaveResult);\n  }, []);\n\n  useEffect(() => {\n    if (!isOpen || !pendingAction) return;''',
          )
          replace(
              "components/token-studio-workspace.tsx",
              '''  function saveAndClose() {\n    const saveButton = findStudioButton("save project");\n    saveButton?.click();\n    window.setTimeout(() => {\n      setPendingAction(null);\n      setIsOpen(false);\n    }, 100);\n  }''',
              '''  function saveAndClose() {\n    const saveButton = findStudioButton("save project");\n    if (!saveButton) return;\n    awaitingSaveAndClose.current = true;\n    saveButton.click();\n  }''',
          )

          # TokenProject documentation must include description as a stale input.
          replace(
              "lib/types.ts",
              "another's.\n   */",
              "another's. The same reset applies when the project description changes.\n   */",
          )

          # Repository boundary rejects a faulty adapter returning the wrong slug.
          replace(
              "lib/server/public-generated-sites.ts",
              '''export async function getPublicGeneratedSiteBySlug(slug: string): Promise<PublicGeneratedSite | null> {\n  return activeAdapter(slug);\n}''',
              '''export async function getPublicGeneratedSiteBySlug(slug: string): Promise<PublicGeneratedSite | null> {\n  const site = await activeAdapter(slug);\n  return site?.slug === slug ? site : null;\n}''',
          )

          # Validate real image signatures, not only the declared data-URL MIME type.
          Path("lib/server/public-site-artwork.ts").write_text('''/**\n * Decodes and validates artwork stored on a public generated-site record.\n * The declared MIME type and the file magic bytes must agree.\n */\n\nconst ALLOWED_ARTWORK_MIME_TYPES = new Set(["image/png", "image/jpeg", "image/webp", "image/gif"]);\nconst DATA_URL_PATTERN = /^data:([a-z0-9.+-]+\\/[a-z0-9.+-]+);base64,([a-zA-Z0-9+/=]+)$/i;\nconst MAX_ARTWORK_BYTES = 6_000_000;\n\nexport type DecodedArtwork = {\n  contentType: string;\n  bytes: Buffer;\n};\n\nfunction startsWith(bytes: Buffer, signature: readonly number[]): boolean {\n  return bytes.length >= signature.length && signature.every((value, index) => bytes[index] === value);\n}\n\nfunction hasMatchingMagicBytes(contentType: string, bytes: Buffer): boolean {\n  if (contentType === "image/png") {\n    return startsWith(bytes, [0x89, 0x50, 0x4e, 0x47, 0x0d, 0x0a, 0x1a, 0x0a]);\n  }\n  if (contentType === "image/jpeg") {\n    return startsWith(bytes, [0xff, 0xd8, 0xff]);\n  }\n  if (contentType === "image/gif") {\n    const header = bytes.subarray(0, 6).toString("ascii");\n    return header === "GIF87a" || header === "GIF89a";\n  }\n  if (contentType === "image/webp") {\n    return (\n      bytes.length >= 12 &&\n      bytes.subarray(0, 4).toString("ascii") === "RIFF" &&\n      bytes.subarray(8, 12).toString("ascii") === "WEBP"\n    );\n  }\n  return false;\n}\n\nexport function decodeArtworkDataUrl(dataUrl: string | null | undefined): DecodedArtwork | null {\n  if (typeof dataUrl !== "string" || !dataUrl) return null;\n\n  const match = DATA_URL_PATTERN.exec(dataUrl.trim());\n  if (!match) return null;\n\n  const [, mimeType, base64] = match;\n  const contentType = mimeType.toLowerCase();\n  if (!ALLOWED_ARTWORK_MIME_TYPES.has(contentType)) return null;\n\n  let bytes: Buffer;\n  try {\n    bytes = Buffer.from(base64, "base64");\n  } catch {\n    return null;\n  }\n\n  if (bytes.length === 0 || bytes.length > MAX_ARTWORK_BYTES) return null;\n  if (!hasMatchingMagicBytes(contentType, bytes)) return null;\n  return { contentType, bytes };\n}\n''')

          # Public page uses the same strict decoder for the rendered artwork decision.
          replace(
              "app/[slug]/page.tsx",
              '  const hasArtwork = site.heroImage.startsWith("data:image/");',
              '  const hasArtwork = Boolean(decodeArtworkDataUrl(site.heroImage));',
          )

          # Artwork route refuses mismatches through the repository boundary and prevents MIME sniffing.
          replace(
              "app/[slug]/artwork/route.ts",
              '''      "Content-Type": artwork.contentType,\n      "Cache-Control": "public, max-age=300",''',
              '''      "Content-Type": artwork.contentType,\n      "Cache-Control": "public, max-age=300",\n      "X-Content-Type-Options": "nosniff",''',
          )

          # Hide the private workspace chrome before hydration on public generated pages.
          nav_css = Path("components/app-navigation.module.css")
          nav_text = nav_css.read_text()
          public_css = '''\n\n/* Public generated token pages are standalone sites, not private workspace screens. */\n:global(body:has(.public-generated-site)) { padding-left:0 !important; padding-bottom:0 !important; }\n:global(body:has(.public-generated-site)) .sidebar,\n:global(body:has(.public-generated-site)) .mobileHeader,\n:global(body:has(.public-generated-site)) .bottomNav { display:none !important; }\n'''
          if "body:has(.public-generated-site)" not in nav_text:
              nav_css.write_text(nav_text + public_css)

          # Fix the existing unrelated lint blocker with the narrow internal-Link change only.
          replace(
              "components/liquidity-lab.tsx",
              'import { useEffect, useMemo, useState } from "react";\n',
              'import Link from "next/link";\nimport { useEffect, useMemo, useState } from "react";\n',
          )
          replace(
              "components/liquidity-lab.tsx",
              '<a className={styles.back} href="/allocations">← Return to allocations</a>',
              '<Link className={styles.back} href="/allocations">← Return to allocations</Link>',
          )

          # Existing source-guard test now includes description as a stale input.
          replace(
              "tests/token-studio-slug-flow.test.ts",
              '''expect(studio).toContain('const IDENTITY_KEYS = new Set<keyof TokenProject>(["name", "ticker", "heroImage"]);');''',
              '''expect(studio).toContain('"description",');''',
          )

          # Use an actual PNG payload in page/route fixtures.
          png_decl = '''const PNG_BASE64 =\n  "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/x8AAusB9Wl2nWQAAAAASUVORK5CYII=";'''
          for test_path in ["tests/public-site-page.test.ts", "tests/public-site-artwork-route.test.ts"]:
              replace(
                  test_path,
                  'const PNG_BASE64 = Buffer.from("fake-png-bytes").toString("base64");',
                  png_decl,
              )
          replace(
              "tests/public-site-artwork-route.test.ts",
              '    expect(buffer.toString()).toBe("fake-png-bytes");',
              '''    expect(buffer.subarray(0, 8)).toEqual(\n      Buffer.from([0x89, 0x50, 0x4e, 0x47, 0x0d, 0x0a, 0x1a, 0x0a]),\n    );\n    expect(response.headers.get("X-Content-Type-Options")).toBe("nosniff");''',
          )

          # Comprehensive artwork signature tests.
          Path("tests/public-site-artwork.test.ts").write_text('''import { describe, expect, it } from "vitest";\nimport { decodeArtworkDataUrl } from "@/lib/server/public-site-artwork";\n\nconst asDataUrl = (mime: string, bytes: Buffer) =>\n  `data:${mime};base64,${bytes.toString("base64")}`;\n\nconst PNG = Buffer.from(\n  "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/x8AAusB9Wl2nWQAAAAASUVORK5CYII=",\n  "base64",\n);\nconst JPEG = Buffer.from([0xff, 0xd8, 0xff, 0xd9]);\nconst GIF = Buffer.from("GIF89a", "ascii");\nconst WEBP = Buffer.concat([Buffer.from("RIFF", "ascii"), Buffer.alloc(4), Buffer.from("WEBP", "ascii")]);\n\ndescribe("decodeArtworkDataUrl", () => {\n  it.each([\n    ["image/png", PNG],\n    ["image/jpeg", JPEG],\n    ["image/gif", GIF],\n    ["image/webp", WEBP],\n  ] as const)("accepts %s only when its magic bytes match", (mime, bytes) => {\n    const result = decodeArtworkDataUrl(asDataUrl(mime, bytes));\n    expect(result?.contentType).toBe(mime);\n    expect(result?.bytes).toEqual(bytes);\n  });\n\n  it("rejects a declared MIME type that does not match the bytes", () => {\n    expect(decodeArtworkDataUrl(asDataUrl("image/jpeg", PNG))).toBeNull();\n    expect(decodeArtworkDataUrl(asDataUrl("image/png", JPEG))).toBeNull();\n  });\n\n  it("returns null for missing, malformed, empty or disallowed artwork", () => {\n    expect(decodeArtworkDataUrl(undefined)).toBeNull();\n    expect(decodeArtworkDataUrl(null)).toBeNull();\n    expect(decodeArtworkDataUrl("")).toBeNull();\n    expect(decodeArtworkDataUrl("not a data url")).toBeNull();\n    expect(decodeArtworkDataUrl("data:image/png;base64,")).toBeNull();\n    expect(decodeArtworkDataUrl(asDataUrl("image/svg+xml", PNG))).toBeNull();\n  });\n\n  it("rejects artwork above the byte limit", () => {\n    const oversized = Buffer.concat([\n      Buffer.from([0x89, 0x50, 0x4e, 0x47, 0x0d, 0x0a, 0x1a, 0x0a]),\n      Buffer.alloc(6_000_000),\n    ]);\n    expect(decodeArtworkDataUrl(asDataUrl("image/png", oversized))).toBeNull();\n  });\n});\n''')

          # Behaviour + wiring regressions requested during review.
          Path("tests/project-save-result.test.ts").write_text('''import { describe, expect, it } from "vitest";\nimport { shouldCloseWorkspaceAfterSave } from "@/lib/project-save-result";\n\ndescribe("Save & close result handling", () => {\n  it("keeps the workspace open after a rejected save", () => {\n    expect(shouldCloseWorkspaceAfterSave({ success: false })).toBe(false);\n    expect(shouldCloseWorkspaceAfterSave(undefined)).toBe(false);\n  });\n\n  it("closes only after a confirmed successful save", () => {\n    expect(shouldCloseWorkspaceAfterSave({ success: true })).toBe(true);\n  });\n});\n''')

          Path("tests/public-site-review-regressions.test.ts").write_text('''import { readFile } from "node:fs/promises";\nimport path from "node:path";\nimport { afterEach, describe, expect, it } from "vitest";\nimport PublicGeneratedSitePage, { generateMetadata } from "@/app/[slug]/page";\nimport { notFound } from "next/navigation";\nimport {\n  resetPublicGeneratedSiteAdapterForTests,\n  setPublicGeneratedSiteAdapter,\n} from "@/lib/server/public-generated-sites";\nimport type { PublicGeneratedSite } from "@/lib/public-site";\n\nconst ROOT = process.cwd();\nconst FIXTURE: PublicGeneratedSite = {\n  slug: "different-slug",\n  name: "Wrong record",\n  ticker: "WRONG",\n  description: "A deliberately mismatched adapter record.",\n  supply: "1",\n  decimals: 18,\n  chain: "robinhood",\n  heroImage: "",\n  generatedSiteHtml: null,\n  contractAddress: "",\n  xHandle: "",\n  telegram: "",\n  status: "draft",\n  createdAt: "2026-01-01T00:00:00.000Z",\n  updatedAt: "2026-01-01T00:00:00.000Z",\n};\n\nfunction notFoundDigest(): string {\n  try {\n    notFound();\n  } catch (error) {\n    return (error as { digest?: string }).digest || "";\n  }\n  throw new Error("notFound() did not throw");\n}\n\nafterEach(() => resetPublicGeneratedSiteAdapterForTests());\n\ndescribe("public-site review regressions", () => {\n  it("rejects an adapter record whose slug does not match the requested path", async () => {\n    setPublicGeneratedSiteAdapter(async () => FIXTURE);\n    const digest = notFoundDigest();\n    await expect(\n      PublicGeneratedSitePage({ params: Promise.resolve({ slug: "requested-slug" }) }),\n    ).rejects.toMatchObject({ digest });\n    await expect(\n      generateMetadata({ params: Promise.resolve({ slug: "requested-slug" }) }),\n    ).resolves.toEqual({});\n  });\n\n  it("wires explicit save results and stales generated HTML on description changes", async () => {\n    const studio = await readFile(path.join(ROOT, "components/token-studio.tsx"), "utf8");\n    const workspace = await readFile(path.join(ROOT, "components/token-studio-workspace.tsx"), "utf8");\n    expect(studio).toContain("PROJECT_SAVE_RESULT_EVENT");\n    expect(studio).toContain("detail: { success: false }");\n    expect(studio).toContain("detail: { success: true }");\n    expect(studio).toContain('"description",');\n    expect(workspace).toContain("shouldCloseWorkspaceAfterSave(detail)");\n    expect(workspace).toContain("awaitingSaveAndClose.current = true");\n  });\n\n  it("removes private workspace chrome before hydration on public pages", async () => {\n    const css = await readFile(path.join(ROOT, "components/app-navigation.module.css"), "utf8");\n    expect(css).toContain("body:has(.public-generated-site)");\n    expect(css).toContain("padding-left:0 !important");\n    expect(css).toContain(".sidebar");\n    expect(css).toContain(".mobileHeader");\n    expect(css).toContain(".bottomNav");\n  });\n\n  it("uses strict artwork validation, nosniff and the narrow lint fix", async () => {\n    const page = await readFile(path.join(ROOT, "app/[slug]/page.tsx"), "utf8");\n    const artworkRoute = await readFile(path.join(ROOT, "app/[slug]/artwork/route.ts"), "utf8");\n    const liquidity = await readFile(path.join(ROOT, "components/liquidity-lab.tsx"), "utf8");\n    expect(page).toContain("Boolean(decodeArtworkDataUrl(site.heroImage))");\n    expect(artworkRoute).toContain('"X-Content-Type-Options": "nosniff"');\n    expect(liquidity).toContain('import Link from "next/link"');\n    expect(liquidity).toContain('<Link className={styles.back} href="/allocations">');\n  });\n});\n''')

          # Repository test explicitly protects the mismatch rule.
          repo_test = Path("tests/public-generated-sites.test.ts")
          repo_text = repo_test.read_text()
          marker = '''  it("restores the no-records default after resetPublicGeneratedSiteAdapterForTests", async () => {'''
          mismatch_test = '''  it("rejects an injected adapter record whose slug does not match the lookup", async () => {\n    setPublicGeneratedSiteAdapter(async () => FIXTURE);\n    expect(await getPublicGeneratedSiteBySlug("different-slug")).toBeNull();\n  });\n\n'''
          if mismatch_test not in repo_text:
              if marker not in repo_text:
                  raise SystemExit("Repository test insertion marker not found")
              repo_test.write_text(repo_text.replace(marker, mismatch_test + marker, 1))

          # Artwork route behaviour test for a mismatched record.
          route_test = Path("tests/public-site-artwork-route.test.ts")
          route_text = route_test.read_text()
          route_marker = '''  it("returns 404 when no public record exists for the slug", async () => {'''
          mismatch_route_test = '''  it("returns 404 when the adapter returns a record for another slug", async () => {\n    setPublicGeneratedSiteAdapter(async () => ({ ...BASE_FIXTURE, slug: "another-slug" }));\n    const response = await call("hoodlums");\n    expect(response.status).toBe(404);\n  });\n\n'''
          if mismatch_route_test not in route_text:
              if route_marker not in route_text:
                  raise SystemExit("Artwork route test insertion marker not found")
              route_test.write_text(route_text.replace(route_marker, mismatch_route_test + route_marker, 1))

          # Keep docs aligned with the new stale inputs and lint status.
          for doc in ["README.md", "AGENTS.md", "CLAUDE.md"]:
              p = Path(doc)
              text = p.read_text()
              text = text.replace("name/ticker/artwork", "name/ticker/description/artwork")
              text = text.replace("name, ticker or artwork", "name, ticker, description or artwork")
              p.write_text(text)
          PY

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Commit reviewed corrections
        shell: bash
        run: |
          rm .github/workflows/apply-public-site-review-fixes.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix public generated-site review findings"
          git push origin HEAD:claude/issue-114-20260724-0639
