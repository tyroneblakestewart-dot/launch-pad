name: Revert five-design release

on:
  push:
    branches:
      - hotfix/revert-five-design-variants

permissions:
  contents: write

jobs:
  revert:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: hotfix/revert-five-design-variants
          fetch-depth: 0
      - name: Revert PR 118 while preserving later mobile hotfix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git revert -m 1 --no-edit d1287f21f96e604d662be322845c09603a27e015
          rm .github/workflows/revert-five-design-variants.yml
          git add -A
          git commit --amend --no-edit
          git push origin HEAD:hotfix/revert-five-design-variants
