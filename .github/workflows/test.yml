name: Test suite

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --silent

      - name: Run full test suite
        run: npm test
        env:
          CI: true
          NEXT_TELEMETRY_DISABLED: 1
          VITEST_SKIP_INSTALL_CHECKS: 1
