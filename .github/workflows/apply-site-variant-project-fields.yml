name: Apply selected site variant project fields

on:
  push:
    branches:
      - feat/five-site-design-variants

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/five-site-design-variants
          fetch-depth: 0

      - name: Apply focused project-field changes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str, count: int = 1) -> None:
              file = Path(path)
              text = file.read_text()
              if old not in text:
                  raise SystemExit(f"Expected text not found in {path}: {old[:120]!r}")
              file.write_text(text.replace(old, new, count))

          replace(
              "lib/types.ts",
              '  /** Increments each time `generatedSiteHtml` is captured. */\n  generatedSiteVersion?: number | null;\n',
              '  /** Increments each time `generatedSiteHtml` is captured. */\n  generatedSiteVersion?: number | null;\n  /** Stable ID of the currently chosen generated design direction. */\n  generatedSiteVariantId?: string | null;\n  /** Human-readable label of the currently chosen design direction. */\n  generatedSiteVariantLabel?: string | null;\n',
          )

          replace(
              "components/token-studio.tsx",
              'import { PROJECT_SAVE_RESULT_EVENT } from "@/lib/project-save-result";\n',
              'import { PROJECT_SAVE_RESULT_EVENT } from "@/lib/project-save-result";\nimport { getSiteDesignVariant } from "@/lib/site-design-variants";\n',
          )
          replace(
              "components/token-studio.tsx",
              '      const detail = (event as CustomEvent<{ fullPage?: boolean; html?: unknown }>).detail;\n      if (!detail?.fullPage || typeof detail.html !== "string") return;\n      if (!isCompleteGeneratedPageHtml(detail.html)) return;\n      const html = detail.html;\n',
              '      const detail = (event as CustomEvent<{\n        fullPage?: boolean;\n        html?: unknown;\n        variantId?: unknown;\n        variantLabel?: unknown;\n      }>).detail;\n      if (!detail?.fullPage || typeof detail.html !== "string") return;\n      if (!isCompleteGeneratedPageHtml(detail.html)) return;\n      const variant = getSiteDesignVariant(typeof detail.variantId === "string" ? detail.variantId : "");\n      if (!variant || detail.variantLabel !== variant.label) return;\n      const html = detail.html;\n',
          )
          replace(
              "components/token-studio.tsx",
              '        generatedSiteVersion: (current.generatedSiteVersion || 0) + 1,\n        updatedAt: new Date().toISOString(),\n',
              '        generatedSiteVersion: (current.generatedSiteVersion || 0) + 1,\n        generatedSiteVariantId: variant.id,\n        generatedSiteVariantLabel: variant.label,\n        updatedAt: new Date().toISOString(),\n',
          )
          replace(
              "components/token-studio.tsx",
              '        generatedSiteVersion: identityChanged ? null : current.generatedSiteVersion,\n        updatedAt: new Date().toISOString(),\n',
              '        generatedSiteVersion: identityChanged ? null : current.generatedSiteVersion,\n        generatedSiteVariantId: identityChanged ? null : current.generatedSiteVariantId,\n        generatedSiteVariantLabel: identityChanged ? null : current.generatedSiteVariantLabel,\n        updatedAt: new Date().toISOString(),\n',
          )
          replace(
              "components/token-studio.tsx",
              '      generatedSiteVersion: current.name !== value ? null : current.generatedSiteVersion,\n      updatedAt: new Date().toISOString(),\n',
              '      generatedSiteVersion: current.name !== value ? null : current.generatedSiteVersion,\n      generatedSiteVariantId: current.name !== value ? null : current.generatedSiteVariantId,\n      generatedSiteVariantLabel: current.name !== value ? null : current.generatedSiteVariantLabel,\n      updatedAt: new Date().toISOString(),\n',
          )

          replace(
              "lib/public-site.ts",
              '  /** Validated standalone generated page HTML, or null if none exists yet. */\n  generatedSiteHtml: string | null;\n',
              '  /** Validated standalone generated page HTML for the chosen design. */\n  generatedSiteHtml: string | null;\n  generatedSiteVariantId?: string | null;\n  generatedSiteVariantLabel?: string | null;\n',
          )
          replace(
              "lib/public-site.ts",
              '    generatedSiteHtml: project.generatedSiteHtml || null,\n    contractAddress: project.contractAddress,\n',
              '    generatedSiteHtml: project.generatedSiteHtml || null,\n    generatedSiteVariantId: project.generatedSiteVariantId || null,\n    generatedSiteVariantLabel: project.generatedSiteVariantLabel || null,\n    contractAddress: project.contractAddress,\n',
          )

          Path(".github/workflows/apply-site-variant-project-fields.yml").unlink()
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Save the selected generated site variant with projects"
          git push origin HEAD:feat/five-site-design-variants
