name: Diagnose five site variants

on:
  push:
    branches:
      - diagnose/five-site-design-variants

permissions:
  contents: read
  issues: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: diagnose/five-site-design-variants
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Capture focused Vitest report
        shell: bash
        run: |
          set +e
          npx vitest run --reporter=json --outputFile=vitest-report.json
          status=$?
          node <<'NODE' > failed-summary.txt
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('vitest-report.json', 'utf8'));
          console.log(`Vitest success: ${report.success}`);
          console.log(`Suites: ${report.numPassedTestSuites}/${report.numTotalTestSuites} passed`);
          console.log(`Tests: ${report.numPassedTests}/${report.numTotalTests} passed`);
          console.log('');
          for (const suite of report.testResults || []) {
            const failed = (suite.assertionResults || []).filter((item) => item.status === 'failed');
            if (!failed.length && suite.status !== 'failed') continue;
            console.log(`FILE: ${suite.name}`);
            for (const item of failed) {
              console.log(`TEST: ${(item.ancestorTitles || []).concat(item.title || '').join(' > ')}`);
              for (const message of item.failureMessages || []) console.log(message);
              console.log('---');
            }
            if (!failed.length && suite.message) console.log(suite.message);
            console.log('========');
          }
          NODE
          echo "EXIT_STATUS=$status" >> failed-summary.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: five-site-variant-vitest-report
          path: |
            failed-summary.txt
            vitest-report.json
      - name: Comment focused diagnostic
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          {
            echo '### Focused five-site-variant Vitest diagnostic'
            echo
            echo '```text'
            cat failed-summary.txt
            echo '```'
          } > diagnostic-comment.md
          gh issue comment 117 --body-file diagnostic-comment.md
