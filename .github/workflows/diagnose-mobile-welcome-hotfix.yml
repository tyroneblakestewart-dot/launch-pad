name: Diagnose mobile welcome hotfix

on:
  push:
    branches:
      - hotfix/mobile-welcome-artwork-crash

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: hotfix/mobile-welcome-artwork-crash
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Capture test output
        shell: bash
        run: |
          set +e
          npm test > mobile-hotfix-test-output.txt 2>&1
          status=$?
          printf '\nEXIT_STATUS=%s\n' "$status" >> mobile-hotfix-test-output.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: mobile-hotfix-test-output
          path: mobile-hotfix-test-output.txt
