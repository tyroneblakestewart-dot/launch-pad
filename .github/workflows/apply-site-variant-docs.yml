name: Apply site variant documentation

on:
  push:
    branches:
      - feat/five-site-design-variants

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/five-site-design-variants
          fetch-depth: 0

      - name: Update documentation
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str, count: int = 1) -> None:
              file = Path(path)
              text = file.read_text()
              if old not in text:
                  raise SystemExit(f"Expected text not found in {path}: {old[:120]!r}")
              file.write_text(text.replace(old, new, count))

          replace(
              "README.md",
              "- Generate an artwork-directed token landing page, including its palette, typography, layout, and project-specific copy.\n- Preview the generated page in an isolated frame and automatically show a Dexscreener chart when a trading pair is found for the saved contract address.\n",
              "- Generate five artwork-directed token landing-page directions, each with a genuinely different composition, navigation, hero treatment and section rhythm.\n- Preview all five in isolated frames, switch between them without another AI call, save the chosen design with the project, and automatically show a Dexscreener chart when a trading pair is found for the saved contract address.\n",
          )
          replace(
              "README.md",
              "The **Generate site from artwork** flow becomes available after the required project details and artwork are present. Site style analysis can use OpenAI vision, and the full-page generator returns a self-contained landing-page preview based on the project rather than fixed demo copy.\n",
              "The **Generate site from artwork** flow becomes available after the required project details and artwork are present. One protected browser request analyses the artwork (and optional inspiration) once, then runs five full-page OpenAI generations in parallel and returns five self-contained landing-page previews rather than fixed demo copy.\n\nThe five stable directions are **Editorial Poster** (asymmetrical magazine storytelling), **Cinematic Showcase** (full-bleed scene-led pacing), **Modular Cardscape** (varied bento modules), **Kinetic Collage** (overlap, diagonals and playful movement), and **Minimal Gallery** (restrained artwork-first exhibition pacing). Server-side variant markers and a structural diversity check reject missing directions, duplicate layouts and obvious colour-swap-only outputs. The first direction is selected by default; creators can switch among all five without another request, and only the currently chosen HTML plus variant ID/label is saved with the project/public payload.\n\nThis feature keeps the same OpenAI Responses runtime, secret/origin checks, no-store headers and 10-request/hour per-IP protection. A generation action still consumes one request-limit slot, but it now performs five full-page model calls after the shared analysis, so full-page AI usage and cost are roughly five times the previous one-page generation.\n",
          )
          replace(
              "README.md",
              "`TokenProject` gained optional `generatedSiteHtml`/`generatedSiteVersion` fields. The studio listens for the existing `launchpad:site-generated` event (now carrying the validated HTML from `FullWebsiteGenerator`), re-validates it, and stores it on the current project when saved â€” without scraping the DOM. Changing the token name, ticker, or artwork clears the captured HTML so one token's saved project can never accidentally carry another token's generated page. This is only local capture; nothing is published anywhere yet.\n",
              "`TokenProject` stores the chosen design in optional `generatedSiteHtml`/`generatedSiteVersion` plus `generatedSiteVariantId`/`generatedSiteVariantLabel` fields. The studio listens for the existing `launchpad:site-generated` event (carrying validated selected HTML and variant metadata), re-validates it, and updates the current project without scraping the DOM. Switching a preview replaces the chosen HTML/metadata without another fetch. Changing the token name, ticker, description, or artwork clears all captured design fields so one token cannot carry a stale page. This is only local capture; public publishing persistence remains unchanged.\n",
          )

          for path in ["AGENTS.md", "CLAUDE.md"]:
              replace(
                  path,
                  "- `lib/slug.ts` â€” shared website-path validation/reserved-word rules used\n  by both the studio save flow and the public route.\n",
                  "- `lib/slug.ts` â€” shared website-path validation/reserved-word rules used\n  by both the studio save flow and the public route.\n- `lib/site-design-variants.ts` / `lib/generated-site-variants.ts` â€” the five\n  stable artwork-driven design directions, response validation and structural\n  diversity guard used by the protected full-page generator and selector.\n",
              )
              text = Path(path).read_text()
              marker = "- Public generated token site infrastructure is merged (issue #114):"
              index = text.find(marker)
              if index < 0:
                  raise SystemExit(f"Roadmap marker missing in {path}")
              bullet = "- Artwork-driven full-page generation now returns five selectable directions (issue #117): Editorial Poster, Cinematic Showcase, Modular Cardscape, Kinetic Collage and Minimal Gallery. One protected browser request reuses one artwork/inspiration analysis and fans out to five parallel full-page OpenAI calls. Live sandboxed thumbnails let the creator switch locally; only the chosen validated HTML plus variant ID/label is saved. The shared-secret, allowed-origin and 10-request/hour request limit are unchanged, while full-page model usage per generation is roughly fivefold.\n"
              if bullet not in text:
                  Path(path).write_text(text[:index] + bullet + text[index:])

          Path(".github/workflows/apply-site-variant-docs.yml").unlink()
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Document five selectable site design variants"
          git push origin HEAD:feat/five-site-design-variants
