name: Lock contract dependencies

on:
  push:
    branches:
      - feat/robinhood-testnet-token-factory

permissions:
  contents: write

jobs:
  lock:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NPM_CONFIG_AUDIT: "false"
      NPM_CONFIG_FUND: "false"
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/robinhood-testnet-token-factory

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate exact dependency lock
        run: npm install --silent

      - name: Commit generated lockfile
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- package-lock.json && git ls-files --error-unmatch package-lock.json >/dev/null 2>&1; then
            echo "package-lock.json is already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "Lock Solidity toolchain dependencies"
          git push origin HEAD:feat/robinhood-testnet-token-factory
