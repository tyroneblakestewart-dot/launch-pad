name: Live full generation diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout diagnostic assets
        uses: actions/checkout@v4

      - name: Generate Tube-map and Tesco website in production
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path
          image = Path('diagnostics/tube-map-smoke.b64').read_text().strip()
          payload = {
              'name': 'City Journey',
              'ticker': 'RIDE',
              'description': 'A playful community journey inspired by navigating London together.',
              'imageDataUrl': 'data:image/jpeg;base64,' + image,
              'inspirationUrl': 'https://www.tesco.com/',
          }
          Path('payload.json').write_text(json.dumps(payload))
          PY

          status=$(curl --retry 2 --retry-delay 3 --connect-timeout 15 --max-time 150 \
            -sS -o response.json -w "%{http_code}" \
            -X POST https://hoodlums.dev/api/generate-site-page \
            -H 'Origin: https://hoodlums.dev' \
            -H 'Content-Type: application/json' \
            -H 'x-hoodlums-api-key: hoodlums-generation-bridge-v1' \
            --data-binary @payload.json)

          echo "$status" > response-status.txt
          echo "HTTP_STATUS=$status"
          python - "$status" <<'PY'
          import json, re, sys
          from pathlib import Path
          status = int(sys.argv[1])
          body = json.loads(Path('response.json').read_text())
          if status != 200:
              print('ERROR=' + str(body.get('error')))
              raise SystemExit(1)
          html = body.get('html', '')
          lower = html.lower()
          print('SOURCE=' + str(body.get('source')))
          print('INSPIRATION_USED=' + str(body.get('inspirationUsed')))
          print('HTML_LENGTH=' + str(len(html)))
          print('ARTICLE_COUNT=' + str(len(re.findall(r'<article\b', lower))))
          required = ['id="hero"', 'id="about"', 'id="tokenomics"', 'id="roadmap"', 'id="how-to-buy"', 'id="community"']
          for marker in required:
              if marker not in lower and marker.replace('"', "'") not in lower:
                  raise SystemExit('missing section ' + marker)
          if body.get('inspirationUsed') is not True:
              raise SystemExit('inspiration was not confirmed')
          if '<nav' not in lower:
              raise SystemExit('missing navigation')
          if not any(term in lower for term in ['type="search"', "type='search'", 'discover', 'category', 'browse']):
              raise SystemExit('missing retail discovery structure')
          if len(re.findall(r'<article\b', lower)) < 6:
              raise SystemExit('not enough campaign/category cards')
          forbidden = ['root@', 'tokenomics.sh', 'initiate_heist', 'steal the memes', 'join the heist']
          for marker in forbidden:
              if marker in lower:
                  raise SystemExit('legacy terminal marker: ' + marker)
          print('LIVE_FULL_GENERATION=PASS')
          PY

      - name: Upload production response
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-generation-response
          path: |
            response.json
            response-status.txt
          if-no-files-found: warn
